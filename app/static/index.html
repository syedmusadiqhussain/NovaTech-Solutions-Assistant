<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Dashboard - RAG Chatbot</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>

  <body>
    <div class="mesh" aria-hidden="true"></div>

    <div class="app">
      <aside class="sidebar" id="sidebar" aria-label="Sidebar">
        <div class="sidebar__top">
          <button class="icon-btn" id="toggleSidebar" type="button" aria-label="Toggle sidebar">
            <i data-lucide="panel-left"></i>
          </button>
          <div class="sidebar__brand">
            <div class="sidebar__title">AI Dashboard</div>
            <div class="sidebar__sub">RAG Chatbot</div>
          </div>
        </div>

        <div class="sidebar__section">
          <div class="sidebar__sectionTitle">Chat History</div>
          <div class="history" id="history"></div>
          <button class="btn btn--ghost" id="newChat" type="button">
            <i data-lucide="plus"></i>
            <span>New chat</span>
          </button>
        </div>

        <div class="sidebar__section sidebar__section--grow">
          <div class="sidebar__sectionTitle">Uploaded Documents</div>
          <div class="muted">Uploads are a placeholder UI element.</div>
          <div class="uploads" id="uploads"></div>
        </div>

        <div class="sidebar__footer">
          <a class="link" href="/docs" target="_blank" rel="noreferrer">API Docs</a>
          <a class="link" href="/health" target="_blank" rel="noreferrer">Health</a>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="topbar__left">
            <button
              class="icon-btn icon-btn--ghost"
              id="toggleSidebarInline"
              type="button"
              aria-label="Toggle sidebar"
            >
              <i data-lucide="menu"></i>
            </button>
            <div class="headline">
              <div class="headline__title" id="chatTitle">NovaTech Solutions Assistant</div>
              <div class="headline__sub">Ask questions grounded in your knowledge base</div>
            </div>
          </div>
          <div class="status-pill status-pill--warn" id="statusPill" title="API status">
            <span class="dot"></span>
            <span class="status-pill__text" id="statusText">Checking…</span>
          </div>
        </div>

        <section class="panel chat-panel" aria-label="Chat">
          <div class="messages" id="messages" aria-live="polite"></div>

          <form class="composer" id="composer">
            <div class="composer__tools">
              <input class="file-input" id="file" type="file" />
              <button class="icon-btn" id="attach" type="button" aria-label="Attach file">
                <i data-lucide="paperclip"></i>
              </button>
            </div>

            <textarea
              class="composer__input"
              id="question"
              placeholder="Type a message… (Shift+Enter for new line)"
              rows="1"
              required
            ></textarea>

            <button class="btn btn--primary" id="send" type="submit">
              <i data-lucide="sparkles"></i>
              <span>Send</span>
            </button>
          </form>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@latest" crossorigin="anonymous"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.6/purify.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script>
      const el = {
        statusPill: document.getElementById("statusPill"),
        statusText: document.getElementById("statusText"),
        sidebar: document.getElementById("sidebar"),
        toggleSidebar: document.getElementById("toggleSidebar"),
        toggleSidebarInline: document.getElementById("toggleSidebarInline"),
        history: document.getElementById("history"),
        uploads: document.getElementById("uploads"),
        newChat: document.getElementById("newChat"),
        messages: document.getElementById("messages"),
        composer: document.getElementById("composer"),
        question: document.getElementById("question"),
        file: document.getElementById("file"),
        attach: document.getElementById("attach"),
        send: document.getElementById("send"),
      };

      const STORAGE_KEY = "rag_dashboard_chats_v1";
      const UI_KEY = "rag_dashboard_ui_v1";

      function safeParseJson(v, fallback) {
        try {
          return JSON.parse(v);
        } catch {
          return fallback;
        }
      }

      function nowId() {
        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function getState() {
        const stored = safeParseJson(localStorage.getItem(STORAGE_KEY) || "null", null);
        if (stored && stored.chats && stored.activeId) return stored;
        const firstId = nowId();
        return {
          activeId: firstId,
          chats: [{ id: firstId, title: "New chat", messages: [], createdAt: Date.now() }],
          uploads: [],
        };
      }

      function saveState(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function getUiState() {
        const stored = safeParseJson(localStorage.getItem(UI_KEY) || "null", null);
        return stored && typeof stored.sidebarCollapsed === "boolean" ? stored : { sidebarCollapsed: false };
      }

      function saveUiState(ui) {
        localStorage.setItem(UI_KEY, JSON.stringify(ui));
      }

      function setSidebarCollapsed(collapsed) {
        el.sidebar.classList.toggle("sidebar--collapsed", collapsed);
        const ui = getUiState();
        ui.sidebarCollapsed = collapsed;
        saveUiState(ui);
      }

      function setStatus(mode, text) {
        el.statusPill.classList.remove("status-pill--ok", "status-pill--warn", "status-pill--bad");
        el.statusPill.classList.add(`status-pill--${mode}`);
        el.statusText.textContent = text;
      }

      async function refreshHealth() {
        try {
          const res = await fetch("/health", { cache: "no-store" });
          const data = await res.json();
          if (data.status === "healthy" && data.vector_store === "loaded") setStatus("ok", "API online");
          else if (data.status === "healthy") setStatus("warn", "Index missing");
          else setStatus("warn", "Degraded");
        } catch (e) {
          setStatus("bad", "Offline");
        }
      }

      function renderHistory(state) {
        el.history.innerHTML = "";
        const ordered = [...state.chats].sort((a, b) => b.createdAt - a.createdAt);
        for (const chat of ordered) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "history__item" + (chat.id === state.activeId ? " history__item--active" : "");
          btn.textContent = chat.title || "Chat";
          btn.addEventListener("click", () => {
            state.activeId = chat.id;
            saveState(state);
            renderAll(state);
          });
          el.history.appendChild(btn);
        }
      }

      function renderUploads(state) {
        el.uploads.innerHTML = "";
        for (const u of state.uploads.slice(-6).reverse()) {
          const item = document.createElement("div");
          item.className = "upload";
          item.textContent = u.name;
          el.uploads.appendChild(item);
        }
      }

      function renderMarkdown(md) {
        if (!window.marked || !window.DOMPurify) return String(md || "");
        const raw = window.marked.parse(md || "", { gfm: true, breaks: true });
        return window.DOMPurify.sanitize(raw, { USE_PROFILES: { html: true } });
      }

      function highlight(container) {
        if (!window.hljs) return;
        const blocks = container.querySelectorAll("pre code");
        for (const b of blocks) window.hljs.highlightElement(b);
      }

      function addMessage(role, text, opts = {}) {
        const wrap = document.createElement("div");
        wrap.className = `msg msg--${role}`;
        const bubble = document.createElement("div");
        bubble.className = "msg__bubble";
        if (opts.markdown) {
          bubble.innerHTML = renderMarkdown(text);
          highlight(bubble);
        } else {
          bubble.textContent = text;
        }
        wrap.appendChild(bubble);
        wrap.style.setProperty("--delay", `${Math.random() * 0.06}s`);
        el.messages.appendChild(wrap);
        el.messages.scrollTop = el.messages.scrollHeight;
        return bubble;
      }

      async function ask(question) {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error((data && data.error) || "Request failed");
        return data;
      }

      function autoResizeTextarea() {
        el.question.style.height = "0px";
        const next = Math.min(el.question.scrollHeight, 180);
        el.question.style.height = next + "px";
      }

      async function typeIn(bubble, fullText) {
        bubble.innerHTML = "";
        const content = document.createElement("div");
        content.className = "typing";
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        bubble.appendChild(content);
        bubble.appendChild(cursor);

        const text = String(fullText || "");
        const step = Math.max(1, Math.floor(text.length / 220));
        let i = 0;
        while (i < text.length) {
          i = Math.min(text.length, i + step);
          content.textContent = text.slice(0, i);
          el.messages.scrollTop = el.messages.scrollHeight;
          await new Promise((r) => setTimeout(r, 12));
        }

        bubble.innerHTML = renderMarkdown(text);
        highlight(bubble);
      }

      function getActiveChat(state) {
        return state.chats.find((c) => c.id === state.activeId) || state.chats[0];
      }

      function renderMessages(state) {
        el.messages.innerHTML = "";
        const chat = getActiveChat(state);
        for (const m of chat.messages) {
          addMessage(m.role, m.content, { markdown: m.role === "assistant" });
        }
      }

      function renderAll(state) {
        renderHistory(state);
        renderUploads(state);
        renderMessages(state);
      }

      function titleFromQuestion(q) {
        const s = String(q || "")
          .trim()
          .replace(/\s+/g, " ");
        return s.length > 36 ? s.slice(0, 36) + "…" : s || "Chat";
      }

      function newChat(state) {
        const id = nowId();
        state.activeId = id;
        state.chats.unshift({ id, title: "New chat", messages: [], createdAt: Date.now() });
        saveState(state);
        renderAll(state);
      }

      function toggleSidebar() {
        const ui = getUiState();
        setSidebarCollapsed(!ui.sidebarCollapsed);
      }

      el.toggleSidebar.addEventListener("click", toggleSidebar);
      el.toggleSidebarInline.addEventListener("click", toggleSidebar);

      el.newChat.addEventListener("click", () => {
        const state = getState();
        newChat(state);
      });

      el.question.addEventListener("input", autoResizeTextarea);
      el.question.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          el.composer.requestSubmit();
        }
      });

      el.attach.addEventListener("click", () => el.file.click());
      el.file.addEventListener("change", () => {
        const f = el.file.files && el.file.files[0];
        if (!f) return;
        const state = getState();
        state.uploads.push({ name: f.name, size: f.size, at: Date.now() });
        saveState(state);
        renderUploads(state);
        addMessage("assistant", `Uploaded: ${f.name} (placeholder only)`);
        el.file.value = "";
      });

      el.composer.addEventListener("submit", async (e) => {
        e.preventDefault();
        const q = el.question.value.trim();
        if (!q) return;

        const state = getState();
        const chat = getActiveChat(state);
        if (chat.messages.length === 0) chat.title = titleFromQuestion(q);

        chat.messages.push({ role: "user", content: q });
        saveState(state);
        addMessage("user", q);

        el.question.value = "";
        autoResizeTextarea();
        el.question.focus();

        el.send.disabled = true;
        el.send.classList.add("btn--loading");

        try {
          const out = await ask(q);
          const answer = (out && out.answer) || "";
          chat.messages.push({ role: "assistant", content: answer });
          saveState(state);
          const bubble = addMessage("assistant", "");
          await typeIn(bubble, answer);
        } catch (err) {
          const msg = String(err && err.message ? err.message : err);
          chat.messages.push({ role: "assistant", content: msg });
          saveState(state);
          addMessage("assistant", msg, { markdown: true });
        } finally {
          el.send.disabled = false;
          el.send.classList.remove("btn--loading");
          renderHistory(state);
          refreshHealth();
        }
      });

      const ui = getUiState();
      setSidebarCollapsed(ui.sidebarCollapsed);

      const state = getState();
      saveState(state);
      renderAll(state);

      if (window.lucide) window.lucide.createIcons();
      autoResizeTextarea();
      refreshHealth();
      setInterval(refreshHealth, 12000);
    </script>
  </body>
</html>
